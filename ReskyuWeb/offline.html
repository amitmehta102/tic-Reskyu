<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>You're Offline — RESKYU</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0E0A1F" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark: #0E0A1F; --cream: #FEFAF2; --orange: #F5A623;
      --font-head: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    body {
      background: var(--dark); color: var(--cream);
      font-family: var(--font-body);
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; text-align: center; padding: 24px;
    }
    .card {
      max-width: 480px; width: 100%;
    }
    .icon {
      font-size: 5rem; margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    .logo {
      font-family: var(--font-head); font-weight: 800;
      font-size: 1.2rem; letter-spacing: .08em;
      color: var(--cream); margin-bottom: 32px;
    }
    .logo span { color: var(--orange); }
    h1 {
      font-family: var(--font-head); font-weight: 900;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      letter-spacing: -.03em; margin-bottom: 16px;
      line-height: 1.1;
    }
    p {
      color: rgba(254,250,242,.55); line-height: 1.7;
      font-size: 1rem; margin-bottom: 36px;
    }
    .btn {
      display: inline-block; padding: 14px 36px;
      border-radius: 999px; background: var(--orange);
      color: #0E0A1F; font-family: var(--font-head);
      font-weight: 800; font-size: .95rem;
      cursor: pointer; border: none;
      transition: transform .2s, box-shadow .2s;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(245,166,35,.35); }
    .tip {
      margin-top: 28px; padding: 16px;
      background: rgba(254,250,242,.04);
      border: 1px solid rgba(254,250,242,.08);
      border-radius: 12px; font-size: .82rem;
      color: rgba(254,250,242,.4); line-height: 1.6;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@800;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="card">
    <div class="logo">RES<span>KYU</span></div>
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>
      Looks like you've lost your internet connection.<br />
      RESKYU needs connectivity to show live surplus listings and<br />
      authenticate your account.
    </p>
    <a href="/" class="btn" onclick="location.reload(); return false;">
      🔄 Try Again
    </a>
    <div class="tip">
      💡 Tip: Once you're back online, RESKYU's pages load<br />
      instantly from your device's local cache.
    </div>
  </div>
</body>
</html>
