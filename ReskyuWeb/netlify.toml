[build]
  publish = "."

# ── Root: show home page when visiting the site root ────────
[[redirects]]
  from   = "/"
  to     = "/pitch.html"
  status = 200
  force  = false

# ── Clean URL redirects (no .html in address bar) ───────────
[[redirects]]
  from   = "/dashboard"
  to     = "/dashboard.html"
  status = 200
  force  = false

[[redirects]]
  from   = "/restaurant-dashboard"
  to     = "/restaurant-dashboard.html"
  status = 200
  force  = false

[[redirects]]
  from   = "/ngo-dashboard"
  to     = "/ngo-dashboard.html"
  status = 200
  force  = false

# ── 404 catch-all — must be LAST so it only fires for unknown paths ──
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# ── Content-Type for sitemap ──────────────────────────
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    X-Robots-Tag = "noindex"

# ── Content-Type for robots.txt ───────────────────────
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# ── Long-lived cache for images (1 year) ──────────────
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Long-lived cache for CSS & JS (1 year) ────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── No-cache for HTML (always fetch latest) ──────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Security headers on everything ────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
