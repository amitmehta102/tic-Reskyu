[build]
  publish = "."

# ── Custom 404 page ────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# Static files always take priority — redirects only apply when no file matches
[[redirects]]
  from   = "/dashboard"
  to     = "/dashboard.html"
  status = 200
  force  = false

[[redirects]]
  from   = "/restaurant-dashboard"
  to     = "/restaurant-dashboard.html"
  status = 200
  force  = false

[[redirects]]
  from   = "/ngo-dashboard"
  to     = "/ngo-dashboard.html"
  status = 200
  force  = false

# Root redirect — only fires if no file matches "/"
[[redirects]]
  from   = "/"
  to     = "/pitch.html"
  status = 200
  force  = false

# ── Content-Type for sitemap ──────────────────────────
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    X-Robots-Tag = "noindex"

# ── Content-Type for robots.txt ───────────────────────
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# ── Long-lived cache for images (1 year) ──────────────
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Long-lived cache for CSS & JS (1 year) ────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Service Worker — MUST always be fresh, never cached ──────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# ── No-cache for HTML (always fetch latest) ──────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Security headers on everything else ───────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
